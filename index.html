<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Free Art Generator</title>
<style>
  body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background: #f5f5f5; }
  canvas { border: 1px solid #333; margin-top: 10px; max-width: 100%; }
  select, input, button { margin: 10px; padding: 10px; font-size: 16px; }
</style>
</head>
<body>
<h1>Free Art Generator</h1>
<input type="file" id="upload" accept="image/*"><br>
<select id="effect">
  <option value="none">Choose Effect</option>
  <option value="invert">Invert Colors</option>
  <option value="grayscale">Grayscale / Sketch</option>
  <option value="blur">Blur</option>
  <option value="pixelate">Pixelate</option>
  <option value="cartoon">Cartoon</option>
</select>
<button id="apply">Apply Effect</button>
<button id="download">Download Art</button>
<br>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/glfx@0.0.8/dist/glfx.min.js"></script>
<script>
const upload = document.getElementById('upload');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const effectSelect = document.getElementById('effect');
const applyBtn = document.getElementById('apply');
const downloadBtn = document.getElementById('download');

let originalImage = null;

// Upload Image
upload.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event){
    const img = new Image();
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img,0,0);
      originalImage = img;
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

// Apply Effect
applyBtn.addEventListener('click', function(){
  if(!originalImage) return alert('Please upload an image first!');
  const fxCanvas = fx.canvas();
  const texture = fxCanvas.texture(originalImage);

  fxCanvas.draw(texture);

  const selected = effectSelect.value;
  switch(selected){
    case 'invert':
      fxCanvas.invert();
      break;
    case 'grayscale':
      fxCanvas.hueSaturation(-1,0); // Grayscale / sketch
      break;
    case 'blur':
      fxCanvas.triangleBlur(5);
      break;
    case 'pixelate':
      fxCanvas.pixelate(originalImage.width/20);
      break;
    case 'cartoon':
      fxCanvas.denoise(5).bulgePinch(originalImage.width/2,originalImage.height/2,originalImage.width/2,0.5);
      break;
    default:
      fxCanvas.draw(texture);
  }

  fxCanvas.update();
  ctx.drawImage(fxCanvas,0,0);
});

// Download Image
downloadBtn.addEventListener('click', function(){
  const link = document.createElement('a');
  link.download = 'art.png';
  link.href = canvas.toDataURL();
  link.click();
});
</script>
</body>
</html>
