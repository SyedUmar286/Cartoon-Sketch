<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sketch Coloring Art Generator</title>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; }
  canvas { border: 1px solid #333; margin-top: 10px; max-width: 100%; cursor: crosshair; }
  input, button, select { margin: 10px; padding: 10px; font-size: 16px; }
</style>
</head>
<body>
<h1>Interactive Sketch Coloring</h1>
<input type="file" id="upload" accept="image/*"><br>

<label>Choose Color:</label>
<input type="color" id="colorPicker" value="#ff0000">
<label>Brush Size:</label>
<input type="number" id="brushSize" value="5" min="1" max="50">

<button id="applySketch">Apply Sketch Art</button>
<button id="clear">Clear Drawing</button>
<button id="download">Download</button>
<br>
<canvas id="canvas"></canvas>

<script>
const upload = document.getElementById('upload');
const applyBtn = document.getElementById('applySketch');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const brushSizeInput = document.getElementById('brushSize');
const clearBtn = document.getElementById('clear');
const downloadBtn = document.getElementById('download');

let originalImage = null;
let painting = false;

// Upload image
upload.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event){
    const img = new Image();
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img, 0, 0);
      originalImage = img;
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

// Apply Sketch Art
applyBtn.addEventListener('click', function(){
  if(!originalImage) return alert('Please upload an image first!');
  ctx.drawImage(originalImage, 0, 0);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const data = imageData.data;

  for(let i=0;i<data.length;i+=4){
    let r = data[i], g = data[i+1], b = data[i+2];
    const gray = 0.3*r + 0.59*g + 0.11*b;
    data[i] = data[i+1] = data[i+2] = gray;
  }

  const invertedData = new Uint8ClampedArray(data);
  for(let i=0;i<invertedData.length;i+=4){
    invertedData[i] = 255 - invertedData[i];
    invertedData[i+1] = 255 - invertedData[i+1];
    invertedData[i+2] = 255 - invertedData[i+2];
  }

  function blurImage(data, w, h, radius=5){
    const copy = new Uint8ClampedArray(data);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        let rSum=0,gSum=0,bSum=0,count=0;
        for(let dy=-radius;dy<=radius;dy++){
          for(let dx=-radius;dx<=radius;dx++){
            const nx = x+dx;
            const ny = y+dy;
            if(nx>=0 && nx<w && ny>=0 && ny<h){
              const idx = (ny*w + nx)*4;
              rSum += data[idx];
              gSum += data[idx+1];
              bSum += data[idx+2];
              count++;
            }
          }
        }
        const idx = (y*w + x)*4;
        copy[idx] = rSum/count;
        copy[idx+1] = gSum/count;
        copy[idx+2] = bSum/count;
      }
    }
    return copy;
  }

  const blurred = blurImage(invertedData, canvas.width, canvas.height, 5);

  for(let i=0;i<data.length;i+=4){
    const orig = data[i];
    const blur = blurred[i];
    data[i] = data[i+1] = data[i+2] = Math.min(255, (orig << 8)/(255-blur+1));
  }

  ctx.putImageData(imageData, 0, 0);
});

// Coloring / Drawing
canvas.addEventListener('mousedown', e => painting = true);
canvas.addEventListener('mouseup', e => painting = false);
canvas.addEventListener('mouseleave', e => painting = false);

canvas.addEventListener('mousemove', e => {
  if(!painting) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  ctx.fillStyle = colorPicker.value;
  ctx.beginPath();
  ctx.arc(x, y, brushSizeInput.value, 0, Math.PI*2);
  ctx.fill();
});

// Clear Drawing
clearBtn.addEventListener('click', function(){
  if(!originalImage) return;
  ctx.drawImage(originalImage, 0, 0);
  applyBtn.click(); // reapply sketch
});

// Download
downloadBtn.addEventListener('click', function(){
  const link = document.createElement('a');
  link.download = 'colored_sketch.png';
  link.href = canvas.toDataURL();
  link.click();
});
</script>
</body>
</html>
