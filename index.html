<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Browser AI Art Generator</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.5.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.0.5/dist/body-pix.min.js"></script>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; }
  canvas { border: 1px solid #333; margin-top: 10px; max-width: 100%; }
  select, input, button { margin: 10px; padding: 10px; font-size: 16px; }
</style>
</head>
<body>
<h1>Browser AI Art Generator</h1>
<input type="file" id="upload" accept="image/*"><br>
<select id="effect">
  <option value="cartoon">Cartoon</option>
  <option value="sketch">Sketch / Grayscale</option>
  <option value="invert">Invert Colors</option>
</select>
<button id="apply">Apply Art</button>
<button id="download">Download</button>
<br>
<canvas id="canvas"></canvas>

<script>
const upload = document.getElementById('upload');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const effectSelect = document.getElementById('effect');
const applyBtn = document.getElementById('apply');
const downloadBtn = document.getElementById('download');

let originalImage = null;

// Upload Image
upload.addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event){
    const img = new Image();
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img,0,0);
      originalImage = img;
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

// Apply Art
applyBtn.addEventListener('click', function(){
  if(!originalImage) return alert('Please upload an image first!');
  ctx.drawImage(originalImage,0,0);
  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;
  const effect = effectSelect.value;

  for(let i=0;i<data.length;i+=4){
    let r = data[i], g = data[i+1], b = data[i+2];
    switch(effect){
      case 'invert':
        data[i] = 255-r; data[i+1] = 255-g; data[i+2] = 255-b;
        break;
      case 'sketch':
        let gray = 0.3*r + 0.59*g + 0.11*b;
        data[i] = data[i+1] = data[i+2] = gray;
        break;
      case 'cartoon':
        // Cartoon effect: reduce colors + increase contrast
        const avg = (r+g+b)/3;
        data[i] = Math.floor(avg/64)*64;
        data[i+1] = Math.floor(avg/64)*64;
        data[i+2] = Math.floor(avg/64)*64;
        break;
    }
  }

  ctx.putImageData(imageData,0,0);
});

// Download
downloadBtn.addEventListener('click', function(){
  if(!originalImage) return alert('No image to download!');
  const link = document.createElement('a');
  link.download = 'art.png';
  link.href = canvas.toDataURL();
  link.click();
});
</script>
</body>
</html>
