<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sketch Coloring Art Generator</title>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; background: #f0f0f0; }
  canvas { border: 1px solid #333; margin-top: 10px; max-width: 100%; cursor: crosshair; }
  input, button, label { margin: 5px; padding: 8px; font-size: 16px; }
</style>
</head>
<body>
<h1>Interactive Sketch Coloring</h1>
<input type="file" id="upload" accept="image/*"><br>

<label>Brush Color:</label>
<input type="color" id="colorPicker" value="#ff0000">
<label>Brush Size:</label>
<input type="number" id="brushSize" value="5" min="1" max="50">

<button id="applySketch">Apply Sketch Art</button>
<button id="clear">Clear Drawing</button>
<button id="download">Download</button>
<br>
<canvas id="canvas"></canvas>

<script>
const upload = document.getElementById('upload');
const applyBtn = document.getElementById('applySketch');
const clearBtn = document.getElementById('clear');
const downloadBtn = document.getElementById('download');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const colorPicker = document.getElementById('colorPicker');
const brushSizeInput = document.getElementById('brushSize');

let originalImage = null;
let sketchImageData = null;
let painting = false;

// Upload Image
upload.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event){
    const img = new Image();
    img.onload = function(){
      canvas.width = img.width;
      canvas.height = img.height;
      ctx.drawImage(img,0,0);
      originalImage = img;
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

// Apply Sketch Art
applyBtn.addEventListener('click', () => {
  if(!originalImage) return alert('Upload an image first!');
  ctx.drawImage(originalImage,0,0);
  const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  const data = imageData.data;

  // Convert to grayscale
  for(let i=0;i<data.length;i+=4){
    const r=data[i], g=data[i+1], b=data[i+2];
    const gray = 0.3*r + 0.59*g + 0.11*b;
    data[i] = data[i+1] = data[i+2] = gray;
  }

  // Simple invert for sketch effect
  for(let i=0;i<data.length;i+=4){
    data[i] = 255 - data[i];
    data[i+1] = 255 - data[i+1];
    data[i+2] = 255 - data[i+2];
  }

  ctx.putImageData(imageData,0,0);
  sketchImageData = ctx.getImageData(0,0,canvas.width,canvas.height);
});

// Coloring / Drawing
canvas.addEventListener('mousedown', () => painting=true);
canvas.addEventListener('mouseup', () => painting=false);
canvas.addEventListener('mouseleave', () => painting=false);

canvas.addEventListener('mousemove', e => {
  if(!painting) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  ctx.fillStyle = colorPicker.value;
  ctx.beginPath();
  ctx.arc(x, y, brushSizeInput.value, 0, Math.PI*2);
  ctx.fill();
});

// Clear Drawing
clearBtn.addEventListener('click', () => {
  if(!sketchImageData) return;
  ctx.putImageData(sketchImageData,0,0);
});

// Download
downloadBtn.addEventListener('click', () => {
  if(!originalImage) return alert('No image to download!');
  const link = document.createElement('a');
  link.download = 'sketch_colored.png';
  link.href = canvas.toDataURL();
  link.click();
});
</script>
</body>
</html>
