<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>High-Quality Pencil Sketch Coloring</title>
<style>
body { font-family: Arial; text-align: center; background: #f0f0f0; padding: 20px; }
canvas { border: 1px solid #333; margin-top: 10px; max-width: 100%; cursor: crosshair; }
input, button, select, label { margin: 5px; padding: 8px; font-size: 16px; }
</style>
</head>
<body>
<h1>High-Quality Pencil Sketch Coloring Studio</h1>

<input type="file" id="upload" accept="image/*"><br>

<label>Brush Type:</label>
<select id="brushType">
  <option value="pencil">Pencil</option>
  <option value="marker">Marker</option>
  <option value="eraser">Eraser</option>
</select>

<label>Brush Color:</label>
<input type="color" id="colorPicker" value="#ff0000">
<label>Brush Size:</label>
<input type="number" id="brushSize" value="5" min="1" max="50">

<button id="applySketch">Apply Pencil Sketch</button>
<button id="undo">Undo</button>
<button id="redo">Redo</button>
<button id="clear">Clear Drawing</button>
<button id="download">Download Final Art</button>
<br>

<canvas id="canvas"></canvas>

<script>
const upload = document.getElementById('upload');
const applyBtn = document.getElementById('applySketch');
const undoBtn = document.getElementById('undo');
const redoBtn = document.getElementById('redo');
const clearBtn = document.getElementById('clear');
const downloadBtn = document.getElementById('download');
const brushType = document.getElementById('brushType');
const colorPicker = document.getElementById('colorPicker');
const brushSizeInput = document.getElementById('brushSize');

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let originalImage = null;
let sketchImageData = null;

// Drawing Layer
let drawingLayer = document.createElement('canvas');
let drawingCtx = drawingLayer.getContext('2d');

// Undo/Redo stacks
let undoStack = [];
let redoStack = [];
let painting = false;

// Upload Image
upload.addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(event){
    const img = new Image();
    img.onload = function(){
      canvas.width = drawingLayer.width = img.width;
      canvas.height = drawingLayer.height = img.height;
      ctx.drawImage(img,0,0);
      originalImage = img;
    }
    img.src = event.target.result;
  }
  reader.readAsDataURL(file);
});

// Pencil Sketch Algorithm
applyBtn.addEventListener('click', () => {
  if(!originalImage) return alert('Upload an image first!');
  ctx.drawImage(originalImage,0,0);
  let imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
  let data = imageData.data;

  // Convert to grayscale
  for(let i=0;i<data.length;i+=4){
    let gray = 0.3*data[i]+0.59*data[i+1]+0.11*data[i+2];
    data[i]=data[i+1]=data[i+2]=gray;
  }

  // Invert grayscale
  let invertedData = new Uint8ClampedArray(data);
  for(let i=0;i<invertedData.length;i+=4){
    invertedData[i]=255-invertedData[i];
    invertedData[i+1]=255-invertedData[i+1];
    invertedData[i+2]=255-invertedData[i+2];
  }

  // Simple Gaussian blur
  function blur(data, w, h, radius=5){
    let copy = new Uint8ClampedArray(data);
    for(let y=0;y<h;y++){
      for(let x=0;x<w;x++){
        let rSum=0,gSum=0,bSum=0,count=0;
        for(let dy=-radius;dy<=radius;dy++){
          for(let dx=-radius;dx<=radius;dx++){
            const nx=x+dx, ny=y+dy;
            if(nx>=0 && nx<w && ny>=0 && ny<h){
              const idx=(ny*w+nx)*4;
              rSum+=data[idx]; gSum+=data[idx+1]; bSum+=data[idx+2];
              count++;
            }
          }
        }
        const idx=(y*w+x)*4;
        copy[idx]=rSum/count;
        copy[idx+1]=gSum/count;
        copy[idx+2]=bSum/count;
      }
    }
    return copy;
  }

  let blurred = blur(invertedData,canvas.width,canvas.height,5);

  // Dodge blend for pencil sketch
  for(let i=0;i<data.length;i+=4){
    let orig = data[i];
    let blurVal = blurred[i];
    let val = Math.min(255, (orig<<8)/(255-blurVal+1));
    data[i]=data[i+1]=data[i+2]=val;
  }

  ctx.putImageData(imageData,0,0);
  sketchImageData = ctx.getImageData(0,0,canvas.width,canvas.height);

  // Clear drawing layer
  drawingCtx.clearRect(0,0,drawingLayer.width,drawingLayer.height);
  undoStack = [];
  redoStack = [];
  redrawCanvas();
});

// Brush settings
function getBrushSettings(){
  const type = brushType.value;
  const color = type==='eraser' ? 'rgba(0,0,0,0)' : colorPicker.value;
  const size = parseInt(brushSizeInput.value);
  return {type,color,size};
}

// Drawing events
canvas.addEventListener('mousedown', e => { painting=true; startDrawing(e); });
canvas.addEventListener('mouseup', e => { painting=false; endDrawing(e); });
canvas.addEventListener('mouseleave', e => { painting=false; endDrawing(e); });
canvas.addEventListener('mousemove', draw);

let lastX=0, lastY=0;
function startDrawing(e){
  const rect = canvas.getBoundingClientRect();
  lastX = e.clientX - rect.left;
  lastY = e.clientY - rect.top;
  saveState();
}

function draw(e){
  if(!painting) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const {type,color,size} = getBrushSettings();
  drawingCtx.strokeStyle = color;
  drawingCtx.lineWidth = size;
  drawingCtx.lineCap = type==='marker' ? 'round':'butt';
  drawingCtx.globalCompositeOperation = type==='eraser' ? 'destination-out':'source-over';

  drawingCtx.beginPath();
  drawingCtx.moveTo(lastX,lastY);
  drawingCtx.lineTo(x,y);
  drawingCtx.stroke();

  lastX=x; lastY=y;
  redrawCanvas();
}

function endDrawing(e){ painting=false; }
function redrawCanvas(){
  ctx.putImageData(sketchImageData,0,0);
  ctx.drawImage(drawingLayer,0,0);
}

// Undo/Redo
function saveState(){ undoStack.push(drawingCtx.getImageData(0,0,drawingLayer.width,drawingLayer.height)); redoStack=[]; }
undoBtn.addEventListener('click', ()=>{
  if(undoStack.length===0) return;
  redoStack.push(drawingCtx.getImageData(0,0,drawingLayer.width,drawingLayer.height));
  const prev=undoStack.pop();
  drawingCtx.putImageData(prev,0,0);
  redrawCanvas();
});
redoBtn.addEventListener('click', ()=>{
  if(redoStack.length===0) return;
  undoStack.push(drawingCtx.getImageData(0,0,drawingLayer.width,drawingLayer.height));
  const next=redoStack.pop();
  drawingCtx.putImageData(next,0,0);
  redrawCanvas();
});

// Clear
clearBtn.addEventListener('click', ()=>{
  drawingCtx.clearRect(0,0,drawingLayer.width,drawingLayer.height);
  undoStack=[]; redoStack=[];
  redrawCanvas();
});

// Download
downloadBtn.addEventListener('click', ()=>{
  if(!originalImage) return alert('No image to download!');
  const mergedCanvas=document.createElement('canvas');
  mergedCanvas.width=canvas.width; mergedCanvas.height=canvas.height;
  const mergedCtx=mergedCanvas.getContext('2d');
  mergedCtx.putImageData(sketchImageData,0,0);
  mergedCtx.drawImage(drawingLayer,0,0);
  const link=document.createElement('a');
  link.download='colored_sketch.png';
  link.href=mergedCanvas.toDataURL();
  link.click();
});
</script>
</body>
</html>
